{% extends "base.html" %}

{% block content %}

<div class="dashboard">

<h2>Edit Doctor</h2>

<form method="POST">

<input
type="text"
name="name"
value="{{ doctor['name'] }}"
required>

<br><br>

<input
type="text"
name="specialization"
value="{{ doctor['specialization'] }}"
required>

<br><br>

<input
type="text"
name="phone"
value="{{ doctor['phone'] }}"
required>

<br><br>

<input
type="email"
name="email"
value="{{ doctor['email'] }}"
required>

<br><br>

<button type="submit">
Update Doctor
</button>

</form>

<br>

<a href="{{ url_for('doctors') }}">
Back to Doctor List
</a>

</div>

{% endblock %}
