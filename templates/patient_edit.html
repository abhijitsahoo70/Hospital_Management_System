{% extends "base.html" %}

{% block content %}

<div class="dashboard">

    <h2>Edit Patient</h2>

    <form method="POST">

        <label>Patient Name</label><br>
        <input
            type="text"
            name="name"
            value="{{ patient['name'] }}"
            required>

        <br><br>

        <label>Age</label><br>
        <input
            type="number"
            name="age"
            value="{{ patient['age'] }}"
            required>

        <br><br>

        <label>Gender</label><br>

        <select name="gender" required>

            <option value="Male"
            {% if patient['gender'] == 'Male' %}selected{% endif %}>
                Male
            </option>

            <option value="Female"
            {% if patient['gender'] == 'Female' %}selected{% endif %}>
                Female
            </option>

            <option value="Other"
            {% if patient['gender'] == 'Other' %}selected{% endif %}>
                Other
            </option>

        </select>

        <br><br>

        <label>Phone Number</label><br>
        <input
            type="text"
            name="phone"
            value="{{ patient['phone'] }}"
            required>

        <br><br>

        <label>Address</label><br>

        <textarea
            name="address"
            rows="4"
            cols="40"
            required>{{ patient['address'] }}</textarea>

        <br><br>

        <button type="submit">
            Update Patient
        </button>

        &nbsp;

        <a href="{{ url_for('patients') }}">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
