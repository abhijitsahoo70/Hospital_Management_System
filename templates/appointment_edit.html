{% extends "base.html" %}

{% block content %}

<div class="dashboard">

<h2>Edit Appointment</h2>

<form method="POST">

<input type="text"
       name="patient_name"
       value="{{ appointment['patient_name'] }}"
       required>

<br><br>

<input type="text"
       name="doctor_name"
       value="{{ appointment['doctor_name'] }}"
       required>

<br><br>

<input type="date"
       name="appointment_date"
       value="{{ appointment['appointment_date'] }}"
       required>

<br><br>

<input type="time"
       name="appointment_time"
       value="{{ appointment['appointment_time'] }}"
       required>

<br><br>

<button type="submit">
Update Appointment
</button>

</form>

<br>

<a href="{{ url_for('appointments') }}">
Back to Appointment List
</a>

</div>

{% endblock %}
